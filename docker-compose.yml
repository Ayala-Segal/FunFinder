
services:
  # -------------------------
  # PostgreSQL Database
  # -------------------------
  db:
    image: postgres:latest
    container_name: PostgreSQL_DB
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER_SECRET}
      POSTGRES_PASSWORD: ${DB_PASSWORD_SECRET}
      POSTGRES_DB: ${DB_NAME_SECRET}
    ports:
      - "5432:5432"
    volumes:
      # הרצת קובץ יצירת הטבלאות ישירות מתוך תיקיית script
      - ./script/create_tables.sql:/docker-entrypoint-initdb.d/1-create_tables.sql
      
      # מיפוי שאר התיקיות שציינת (לשימוש עתידי בסקריפטים)
      - ./DataImportFiles:/data
      - ./MockarooFiles:/mockaroo
      
      # שמירה קבועה של הנתונים בנתיב הנכון
      - postgres_data:/var/lib/postgresql/data
    networks:
      - zoo_network

  # -------------------------
  # pgAdmin
  # -------------------------
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadminApp
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "8080:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db
    networks:
      - zoo_network

# -------------------------
# Volumes
# -------------------------
volumes:
  postgres_data:
  pgadmin_data:

# -------------------------
# Networks
# -------------------------
networks:
  zoo_network:
